<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramadan Mubarak 🌙</title>
  <meta name="description" content="Send a personalized Ramadan Mubarak greeting card">
  <meta property="og:title" content="Ramadan Mubarak 🌙">
  <meta property="og:description" content="Create your personalized Ramadan greeting card">
  <meta property="og:image" content="card-bg.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Naskh Arabic', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      direction: ltr;
    }

    /* Input Section */
    .input-section {
      text-align: center;
      margin-bottom: 30px;
      transition: all 0.5s ease;
    }

    .input-section.hidden {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
      position: absolute;
    }

    .input-section h2 {
      color: #e8d5a3;
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .input-section p {
      color: #8899b0;
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-group input {
      padding: 14px 24px;
      font-size: 1.1rem;
      border: 2px solid #1e3a5f;
      border-radius: 12px;
      background: #0f2240;
      color: #fff;
      font-family: 'Inter', 'Noto Naskh Arabic', sans-serif;
      width: 300px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-group input::placeholder {
      color: #4a6a8a;
    }

    .input-group input:focus {
      border-color: #e8d5a3;
    }

    .input-group button {
      padding: 14px 32px;
      font-size: 1.05rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #c9a84c, #e8d5a3);
      color: #0a1628;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .input-group button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.3);
    }

    /* Card Container */
    .card-container {
      position: relative;
      max-width: 720px;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.6s ease;
    }

    .card-container.visible {
      opacity: 1;
      transform: scale(1);
    }

    .card-container img {
      width: 100%;
      display: block;
    }

    .name-overlay {
      position: absolute;
      top: 80%;
      left: 10%;
      width: 40%;
      padding: 0;
      background: none;
      text-align: center;
      transform: translateY(-50%);
    }

    .name-label {
      display: none;
    }

    .name-display {
      font-family: 'Amiri', 'Noto Naskh Arabic', serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      word-break: break-word;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .actions.visible {
      opacity: 1;
    }

    .actions button {
      padding: 12px 24px;
      font-size: 0.95rem;
      border: 2px solid #1e3a5f;
      border-radius: 10px;
      background: #0f2240;
      color: #e8d5a3;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .actions button:hover {
      background: #1e3a5f;
      border-color: #e8d5a3;
    }

    .actions button.primary {
      background: linear-gradient(135deg, #c9a84c, #e8d5a3);
      color: #0a1628;
      border: none;
      font-weight: 600;
    }

    .actions button.primary:hover {
      box-shadow: 0 4px 16px rgba(201, 168, 76, 0.3);
    }

    /* Stars animation */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--opacity); }
    }

    /* Moon */
    .moon {
      position: fixed;
      top: 30px;
      right: 40px;
      font-size: 3rem;
      opacity: 0.15;
      pointer-events: none;
      z-index: -1;
    }

    @media (max-width: 500px) {
      .input-group input { width: 100%; }
      .name-display { font-size: 1.4rem; }
      .input-section h2 { font-size: 1.4rem; }
    }

    /* Canvas for download */
    #downloadCanvas { display: none; }
  </style>
</head>
<body>

  <!-- Background stars -->
  <div class="stars" id="stars"></div>
  <div class="moon">🌙</div>

  <!-- Input -->
  <div class="input-section" id="inputSection">
    <h2>✨ Ramadan Mubarak Card ✨</h2>
    <p>Enter your name to create a personalized greeting card<br>أدخل اسمك لإنشاء بطاقة تهنئة شخصية</p>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="Your name / اسمك" autofocus>
      <button onclick="generateCard()">Generate ✨</button>
    </div>
  </div>

  <!-- Card -->
  <div class="card-container" id="cardContainer">
    <img src="card-bg.jpg" alt="Ramadan Mubarak" id="cardImage" crossorigin="anonymous">
    <div class="name-overlay">
      <div class="name-label">With warm wishes from</div>
      <div class="name-display" id="nameDisplay"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actions">
    <button onclick="downloadCard()">📥 Download Card</button>
    <button onclick="shareCard()">📤 Share</button>
    <button onclick="resetCard()">✏️ New Name</button>
  </div>

  <canvas id="downloadCanvas"></canvas>

  <script>
    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--opacity', (0.3 + Math.random() * 0.7));
      star.style.animationDelay = Math.random() * 4 + 's';
      starsEl.appendChild(star);
    }

    // Enter key
    document.getElementById('nameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateCard();
    });

    function generateCard() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        document.getElementById('nameInput').style.borderColor = '#e74c3c';
        setTimeout(() => document.getElementById('nameInput').style.borderColor = '#1e3a5f', 1500);
        return;
      }

      document.getElementById('nameDisplay').textContent = name;
      document.getElementById('inputSection').classList.add('hidden');
      document.getElementById('cardContainer').classList.add('visible');
      document.getElementById('actions').classList.add('visible');
    }

    function resetCard() {
      document.getElementById('inputSection').classList.remove('hidden');
      document.getElementById('cardContainer').classList.remove('visible');
      document.getElementById('actions').classList.remove('visible');
      document.getElementById('nameInput').value = '';
      document.getElementById('nameInput').focus();
    }

    function downloadCard() {
      const canvas = document.getElementById('downloadCanvas');
      const ctx = canvas.getContext('2d');
      const img = document.getElementById('cardImage');
      const name = document.getElementById('nameDisplay').textContent;

      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      ctx.drawImage(img, 0, 0);

      // Name - bottom left area
      const fontSize = Math.min(canvas.width * 0.045, 56);
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${fontSize}px Amiri, Noto Naskh Arabic, serif`;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 12;
      ctx.fillText(name, canvas.width * 0.30, canvas.height * 0.82);

      const link = document.createElement('a');
      link.download = `ramadan-card-${name}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function shareCard() {
      const name = document.getElementById('nameDisplay').textContent;
      const url = window.location.href;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Ramadan Mubarak 🌙',
            text: `${name} wishes you a blessed Ramadan! Create your own card:`,
            url: url
          });
        } catch(e) {}
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert('Link copied to clipboard! 📋');
        });
      }
    }
  </script>
</body>
</html>
